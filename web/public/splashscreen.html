<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: sans-serif;
            user-select: none;
            overflow: hidden;
        }
        .logo {
            width: 80px;
            height: 80px;
            background-color: #22c55e; /* Verde Minecraft */
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }
        .loader {
            width: 200px;
            height: 4px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .bar {
            width: 50%;
            height: 100%;
            background: #22c55e;
            animation: loading 1.5s infinite ease-in-out;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        h2 { font-size: 16px; font-weight: normal; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="logo">M</div>
    <h2>MineLauncher</h2>
    <div class="loader">
        <div class="bar"></div>
    </div>
</body>
</html>
