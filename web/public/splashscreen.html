<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Launcher</title>
    <script>
        // Immediate theme application to prevent flash
        try {
            const storageKey = "vite-ui-theme";
            const theme = localStorage.getItem(storageKey);
            const systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
            
            if (theme === "dark" || (theme === "system" && systemTheme === "dark")) {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        } catch (e) {
            console.error("Error applying theme:", e);
        }
    </script>
    <style>
        :root {
            /* Light Mode - Premium & Clean */
            --bg-color: #ffffff;
            --text-color: #09090b; /* Zinc 950 */
            --muted-color: #71717a; /* Zinc 500 */
            --primary-color: #059669; /* Emerald 600 */
            --primary-glow: rgba(5, 150, 105, 0.2);
            --loader-bg: #e4e4e7; /* Zinc 200 */
            --logo-gradient: linear-gradient(135deg, #059669, #047857);
        }

        /* Dark Mode - Deep & Elegant */
        html.dark {
            --bg-color: #09090b; /* Zinc 950 */
            --text-color: #fafafa; /* Zinc 50 */
            --muted-color: #a1a1aa; /* Zinc 400 */
            --primary-color: #10b981; /* Emerald 500 */
            --primary-glow: rgba(16, 185, 129, 0.15);
            --loader-bg: #27272a; /* Zinc 800 */
            --logo-gradient: linear-gradient(135deg, #10b981, #059669);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-wrapper {
            position: relative;
            width: 96px;
            height: 96px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            inset: -20px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(30px);
            animation: pulse 3s infinite ease-in-out;
        }

        .logo {
            width: 96px;
            height: 96px;
            background: var(--logo-gradient);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 800;
            color: white;
            box-shadow: 0 20px 40px -10px var(--primary-glow);
            position: relative;
            z-index: 10;
            /* Subtle float animation */
            animation: float 6s ease-in-out infinite;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 0;
            background: linear-gradient(to right, var(--text-color), var(--muted-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-container {
            width: 200px;
            height: 4px;
            background: var(--loader-bg);
            border-radius: 9999px;
            overflow: hidden;
            position: relative;
            margin-top: 0.5rem;
        }

        .loader-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background: var(--primary-color);
            border-radius: 9999px;
            animation: loading 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .version {
            font-size: 13px;
            font-weight: 500;
            color: var(--muted-color);
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
            opacity: 0.6;
            letter-spacing: -0.02em;
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { left: 40%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.25; transform: scale(1.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <div class="logo">Z</div>
        </div>
        
        <div class="content">
            <h1>Zenith</h1>
            
            <div class="loader-container">
                <div class="loader-bar"></div>
            </div>

            <div class="version">v0.0.1</div>
        </div>
    </div>
</body>
</html>
